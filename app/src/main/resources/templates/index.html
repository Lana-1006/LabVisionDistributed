<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>LabVisionDistributed</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 40px auto;
            padding: 0 20px;
        }

        h1 {
            color: #333;
        }

        .step {
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 16px;
        }

        .step h2 {
            margin-top: 0;
            font-size: 1.1em;
            color: #555;
        }

        .result {
            color: #1a7f37;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>LabVisionDistributed</h1>
    <p>Workflow overview:</p>

    <div class="step">
        <h2>Step 1: Login</h2>
        <p class="result" th:text="${loginResult}">Login result</p>
    </div>

    <div class="step">
        <h2>Step 2: Upload image</h2>
        <p class="result" th:text="${uploadResult}">Upload result</p>
    </div>

    <div class="step">
        <h2>Step 3: Analyze image</h2>
        <p class="result" th:text="${analysisResult}">Analysis result</p>
    </div>

    <div class="step">
        <h2>Step 4: Create report</h2>
        <p class="result" th:text="${reportResult}">Report result</p>
    </div>
</body>
</html>
